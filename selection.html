<!DOCTYPE html>
<html>
<head>
    <title>Selection-area</title>
    <style>
        body {
            background-color: rgb(255, 205, 96);
        }

        a:link {
            color: rgb(255, 255, 255);
            text-decoration: none; /* Removes default underline */
        }

        a:visited {
            color: rgb(255, 255, 255);
        }

        a:hover {
            color: rgb(146, 146, 146);
        }
        
        .selection {
            display: block;
            text-align: center;
            background-color: rgb(0, 0, 198);
            color: white;
            padding: 10px; /* Add padding around the selections */
            border: 2px solid white; /* Add a white border around the selections */
            margin: 80px; /* Add margin between the selections */
        }
        .selection-2 {
            display: block;
            text-align: center;
            background-color: rgb(186, 0, 0);
            color: white;
            padding: 10px; /* Add padding around the selections */
            border: 2px solid white; /* Add a white border around the selections */
            margin: 80px; /* Add margin between the selections */
        }
        .selection-3 {
            display: block;
            text-align: center;
            background-color: rgb(0, 175, 53);
            color: white;
            padding: 10px; /* Add padding around the selections */
            border: 2px solid white; /* Add a white border around the selections */
            margin: 80px; /* Add margin between the selections */
        }
    </style>
</head>
<body>
    <div class="selection">
        <a href="number-1.html"><h1>國小</h1></a>
    </div>
    <div class="selection-2">
        <a href="number-2.html"><h1>國中</h1></a>
    </div>
    <div class="selection-3">
        <a href="numeber-3.html"><h1>高中</h1></a>
    </div>

    <h2><a href="main.html">Back</a></h2>
</body>
</html>

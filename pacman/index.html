<header>
  <title>Rat chase</title>
  <link rel="shortcut icon" type="image/x-icon" href="cheese.png" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</header>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    width: 100%;
    background-color: black; /* Match your game theme */
  }

  #game-container {
    display: flex;       /* Put canvas and sidebar side-by-side */
    flex-direction: row;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    /* This forces the canvas to shrink to fit the screen */
    max-width: 100%;
    max-height: 100%;
      
    /* This ensures the image doesn't get stretched or squished */
    object-fit: contain; 
  }

  #ui-layer {
    position: absolute;  /* Lock to the container */
    bottom: 20px;        /* Distance from bottom */
    right: 20px;         /* Distance from right */
    text-align: right;   /* Align text to the right */
    font-family: 'Courier New', Courier, monospace; /* Arcade feel */
    pointer-events: none; /* Make sure clicks go through to the game */
  }

  .stat-label {
    color: white;
    font-size: 24px;
    margin: 5px 0;
    text-transform: uppercase;
  }
  #lives{
    display:flex;
    gap:10px;
    justify-content: end;
    margin-top: 5%;
  }
  .icon-wrapper {
    position: relative; 
    width: 20px;
    height: 20px;
    margin-top: 10px; /* Gives a little breathing room for the ears */
  }
  .icon-wrapper div {
    position: absolute;
    border-radius: 50%;
  }
  .life-icon{
    width:20px;
    height:20px;
    background-color: gray;
    border-radius: 50%;
    position: relative;
  }
  .life-icon {
  width: 20px; height: 20px;
  background-color: gray;
  top: 0; left: 0;
}
.leftmouseears {
  width: 13px; height: 13px;
  background-color: gray;
  top: -5px; left: -6px;
}
.rightmouseears {
  width: 13px; height: 13px;
  background-color: gray;
  top: -5px; right: -6px;
}
.leftmouseearsin {
  width: 8px; height: 8px;
  background-color: pink;
  top: -2px; left: -3px;
  z-index: 1; /* Keeps inner ear on top */
}
.rightmouseearsin {
  width: 8px; height: 8px;
  background-color: pink;
  top: -2px; right: -3px;
  z-index: 1;
}
.mouseeyeleft {
  width: 8px; height: 8px;
  background-color: white;
  top: 4px; left: 1px;
}
.mouseeyeright {
  width: 8px; height: 8px;
  background-color: white;
  top: 4px; right: 1px;
}
.mouseeyeleftin {
  width: 5px; height: 5px;
  background-color: black;
  top: 4px; left: -0.5px;
  z-index: 2; /* Keeps pupil on top */
}
.mouseeyerightin {
  width: 5px; height: 5px;
  background-color: black;
  top: 4px; right: 3.5px;
  z-index: 2;
}
  
  #points { 
    color: yellow; } /* Make points stand out! */
</style>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="levels" class="stat-label">Level: 0</div>
        <div id="lives" class="stat-label">Lives: </div>
        <div id='points' class="stat-label">Points: 0</div>
    </div>
</div>
<script src="script.js"></script>
